async function loadPloomesUsers() {
  try{
    const r = await fetch('/api/ploomes-users');
    const users = await r.json();
    const sel = document.getElementById('new-ploomes-select');
    if(!sel || !Array.isArray(users)) return;
    const opts = ['<option value="">(auto / não preencher)</option>'];
    for(const u of users){
      const label = (u.name||'').replace(/</g,'&lt;').replace(/>/g,'&gt;') + ' — ' + (u.email||'') + ' (ID:'+u.id+')';
      opts.push(`<option value="${u.id}">${label}</option>`);
    }
    sel.innerHTML = opts.join('');
  } catch(e){
    console.warn('Falha ao carregar usuários Ploomes:', e);
  }
}

async function generateReport() {
  const btn = document.getElementById('btn-gen-report');
  const status = document.getElementById('report-gen-status');
  btn.disabled = true;
  btn.textContent = '⏳ Gerando...';
  status.textContent = '';
  try {
    const r = await fetch('/api/admin/generate-report', { method: 'POST' });
    const d = await r.json();
    if (d.ok) {
      status.innerHTML = `<span style="color:var(--success,#0a7a2a)">&#10003; Relatório gerado: <strong>${d.filename}</strong></span>`;
      loadReports();
    } else {
      status.innerHTML = `<span style="color:#b00020">${d.error || 'Erro desconhecido'}</span>`;
    }
  } catch(e) {
    status.innerHTML = `<span style="color:#b00020">Erro: ${e.message}</span>`;
  } finally {
    btn.disabled = false;
    btn.textContent = '📈 Gerar Relatório Executivo';
  }
}

async function loadReports() {
  const el = document.getElementById('reports-list');
  if (!el) return;
  el.innerHTML = '<em style="color:var(--text-secondary)">Carregando...</em>';

    const r = await fetch('/api/admin/reports');
    const d = await r.json();
    if (!d.ok || !d.reports.length) {
      el.innerHTML = '<em style="color:var(--text-secondary)">Nenhum relatório encontrado.</em>';
      return;

        <td style="font-size:13px">${name}</td>
        <td style="font-size:13px;color:var(--text-secondary)">${date} UTC</td>
        <td style="font-size:13px;color:var(--text-secondary)">${kb} KB</td>
        <td><a href="/api/admin/reports/${encodeURIComponent(f.filename)}" download class="btn btn-outline btn-sm">⬇️ Baixar</a></td>
      </tr>`;
    }).join('');
    el.innerHTML = `<table style="width:100%;border-collapse:collapse">
      <thead><tr style="background:#f5f5f5">

        <th style="padding:8px;text-align:left;font-size:13px">Criado em</th>

    // ── Formatação ──────────────────────────────────────────────
function fmtBRL(v) {
  return 'R$ ' + Number(v || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtDate(v) {
  if (!v) return '—';
  try { return new Date(v).toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' }); }
  catch { return String(v); }
}

function esc(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function showLoading(on) {

function renderTotals(t) {

  set('kpiInteracoes', t.interacoes7d ?? '—');

  if (tarefasEl) {
    tarefasEl.textContent = t.tarefasVencidas ?? '—';

  }
}

// ── Render Alerts ───────────────────────────────────────────
function renderAlerts(alerts) {
  const container = document.getElementById('alertsList');
  if (!alerts || alerts.length === 0) {
    container.innerHTML = '';
    const empty = document.createElement('div');
    empty.className = 'alerts-empty';
    empty.textContent = '✅ Nenhum alerta no momento.';
    container.appendChild(empty);
    return;
  }

  // Sort: critical first
  const sorted = [...alerts].sort((a, b) => {
    const order = { critical: 0, warning: 1 };
    return (order[a.severity] ?? 2) - (order[b.severity] ?? 2);
  });

  container.innerHTML = '';
  sorted.forEach(a => {
    const item = document.createElement('div');
    item.className = 'alert-item ' + (a.severity === 'critical' ? 'critical' : 'warning');

    const icon = document.createElement('span');
    icon.className = 'alert-icon';
    icon.textContent = a.severity === 'critical' ? '🚨' : '⚠️';

    const body = document.createElement('div');
    body.style.flex = '1';
    const msg = document.createElement('div');
    msg.className = 'alert-msg';
    msg.textContent = a.message || a.msg || String(a);
    const ts = document.createElement('div');
    ts.className = 'alert-ts';
    ts.textContent = fmtDate(a.timestamp || a.ts || a.createdAt);

    body.appendChild(msg);
    body.appendChild(ts);
    item.appendChild(icon);
    item.appendChild(body);
    container.appendChild(item);
  });
}

let vendedoresData = [];
let sortCol = 'riskScore';
let sortAsc = false;

function riskColor(score) {
  if (score <= 30) return 'var(--green)';
  if (score <= 60) return 'var(--yellow)';
  return 'var(--red)';
}

function riskClass(score) {
  if (score <= 30) return 'risk-green';
  if (score <= 60) return 'risk-yellow';
  return 'risk-red';
}

function renderVendedores(vendedores) {
  if (!vendedores) return;
  vendedoresData = vendedores;
  sortAndRenderVendedores();
}

function sortAndRenderVendedores() {
  const sorted = [...vendedoresData].sort((a, b) => {
    let av = a[sortCol] ?? 0;
    let bv = b[sortCol] ?? 0;
    if (sortCol === 'name') {
      av = String(av).toLowerCase();
      bv = String(bv).toLowerCase();
      return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
    }
    return sortAsc ? av - bv : bv - av;
  });

  const tbody = document.getElementById('vendedoresTbody');

    riskBg.appendChild(riskFill);
    const riskVal = document.createElement('span');
    riskVal.className = 'risk-val ' + riskClass(score);
    riskVal.textContent = score;
    riskWrap.appendChild(riskBg);
    riskWrap.appendChild(riskVal);
    tdRisk.appendChild(riskWrap);

    // Deals Abertos / Valor Aberto
    const tdAbertos = document.createElement('td');

    const valAbertos = v.receitaAberta ?? v.receita_aberta;
    const abLine1 = document.createElement('div');
    abLine1.style.fontWeight = '600';
    abLine1.textContent = qtdAbertos + ' deals';
    const abLine2 = document.createElement('div');
    abLine2.className = 'cell-muted';
    abLine2.textContent = valAbertos != null ? fmtBRL(valAbertos) : '—';

    // Ganhos Mês / Receita Mês

    tr.appendChild(tdInter);
    tr.appendChild(tdTarefas);
    tr.appendChild(tdParados);
    tr.appendChild(tdAcoes);
    tbody.appendChild(tr);
  });
}

// ── Table sorting ───────────────────────────────────────────
document.getElementById('vendedoresTable').querySelector('thead').addEventListener('click', function(e) {
  const th = e.target.closest('th');
  if (!th || !th.dataset.col) return;
  const col = th.dataset.col;
  if (sortCol === col) {
    sortAsc = !sortAsc;
  } else {
    sortCol = col;
    sortAsc = col === 'name';
  }
  document.querySelectorAll('#vendedoresTable thead th').forEach(h => h.classList.remove('sorted'));
  th.classList.add('sorted');
  th.textContent = th.textContent.replace(' ▴', '').replace(' ▾', '') + (sortAsc ? ' ▴' : ' ▾');
  sortAndRenderVendedores();
});

// ── Render Agenda ───────────────────────────────────────────
function renderAgenda(agenda) {
  const grid = document.getElementById('agendaGrid');
  if (!agenda || agenda.length === 0) {
    grid.innerHTML = '';
    const empty = document.createElement('div');
    empty.className = 'agenda-empty';
    empty.textContent = '✅ Sem itens na agenda hoje.';
    grid.appendChild(empty);
    return;
  }

  const typeColors = {
    task_overdue: 'p1',
    deal_stalled: 'p2',
    deal_hot: 'p3',
    critical_alert: 'p0',
  };

  const sorted = [...agenda].sort((a, b) => (a.priority ?? 9) - (b.priority ?? 9));
  grid.innerHTML = '';
  sorted.forEach(item => {
    const cls = typeColors[item.type] || ('p' + (item.priority ?? 2));
    const el = document.createElement('div');
    el.className = 'agenda-item ' + cls;

    const iconEl = document.createElement('span');
    iconEl.className = 'agenda-icon';
    iconEl.textContent = item.icon || '📌';

    const body = document.createElement('div');
    const labelEl = document.createElement('div');
    labelEl.className = 'agenda-label';
    labelEl.textContent = item.label || item.type || '';
    const actionEl = document.createElement('div');
    actionEl.className = 'agenda-action';
    actionEl.textContent = item.action || '';

    body.appendChild(labelEl);
    body.appendChild(actionEl);
    el.appendChild(iconEl);
    el.appendChild(body);
    grid.appendChild(el);
  });
}

// ── Main Load ───────────────────────────────────────────────
async function loadAll() {
  clearError();
  showLoading(true);
  try {
    const params = new URLSearchParams();
    if (selectedPipelineId) params.set('pipelineId', selectedPipelineId);
    const gestorUrl = '/api/gestor-dashboard' + (params.toString() ? '?' + params.toString() : '');
    const [gestorRes, alertsRes, agendaRes] = await Promise.allSettled([
      fetch(gestorUrl).then(r => r.json()),
      fetch('/api/alerts').then(r => r.json()),
      fetch('/api/agenda-hoje').then(r => r.json()),
    ]);
    if (gestorRes.status === 'fulfilled') {
      renderTotals(gestorRes.value.teamTotals);
      renderVendedores(gestorRes.value.vendedores);
      document.getElementById('lastUpdate').textContent = new Date(gestorRes.value.generatedAt || Date.now()).toLocaleString('pt-BR');
    } else {
      console.warn('[gestor-dashboard]', gestorRes.reason);
      showError('Erro ao carregar dados do gestor: ' + gestorRes.reason?.message);
    }
    if (alertsRes.status === 'fulfilled') renderAlerts(alertsRes.value);
    else console.warn('[alerts]', alertsRes.reason);
    if (agendaRes.status === 'fulfilled') renderAgenda(agendaRes.value);
    else console.warn('[agenda]', agendaRes.reason);
  } catch (e) {
    showError(e.message);
  } finally {
    showLoading(false);
  }
}

async function gestorViewInit() {
  // Load pipeline filter
  const rp = await fetch('/api/pipelines-active');
  if (rp.ok) {
    const pipelines = await rp.json();
    const psel = document.getElementById('pipelineSelectGestor');
    psel.innerHTML = '<option value="">(Todos os funis)</option>' +
      pipelines.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
    psel.addEventListener('change', () => {
      selectedPipelineId = psel.value ? Number(psel.value) : null;
      loadAll();
    });
  }
  loadAll();
}
    gestorViewInit();
  })();
}

(async function initApp() {
  await bootstrapApp();
  setSidebarMe();

  // nav clicks
  document.getElementById('appNav').addEventListener('click', (e) => {
    const a = e.target.closest('a[data-view]');
    if (!a) return;
    e.preventDefault();
    const view = a.dataset.view;
    router.navigate(view);
  });

  // default view
  const v = (location.hash || '#chat').replace('#','').trim() || 'chat';
  router.render(v);
})();
